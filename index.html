<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クルリト | ステルスルーレット</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f6fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #2f3542;
        }

        h1 { margin-bottom: 5px; color: #2f3542; cursor: default; user-select: none; }
        .subtitle { font-size: 14px; color: #747d8c; margin-bottom: 20px; }
        .main-layout { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 500px; }
        .roulette-container { position: relative; }

        /* 矢印 */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }

        #wheel {
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .controls { display: flex; flex-direction: column; width: 100%; gap: 15px; }
        
        button {
            padding: 15px; font-size: 18px; font-weight: bold; color: #fff;
            background-color: #2ed573; border: none; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        button:hover { background-color: #26af5f; transform: translateY(-1px); }
        button:disabled { background-color: #a4b0be; cursor: not-allowed; transform: none; }

        .config-area, .result-area, .secret-area {
            background: #fff; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box;
        }

        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; }
        
        textarea {
            width: 100%; height: 100px; padding: 10px; border: 1px solid #ced6e0;
            border-radius: 8px; resize: none; box-sizing: border-box; font-size: 16px; margin-bottom: 10px;
        }

        .count-setting {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            background-color: #f1f2f6;
            padding: 10px;
            border-radius: 8px;
        }
        input[type="number"] {
            width: 70px; padding: 8px; border: 1px solid #ced6e0;
            border-radius: 8px; font-size: 16px; text-align: center;
        }

        .result-list { list-style: none; padding: 0; margin: 0; }
        .result-list li { padding: 10px; border-bottom: 1px solid #f1f2f6; font-size: 16px; display: flex; justify-content: space-between; }
        .result-list li:last-child { border-bottom: none; font-weight: bold; color: #ff4757; background-color: #ffeaa7; border-radius: 4px; }
        .rank { font-weight: bold; color: #3742fa; }

        /* 👑 裏設定エリア：完全に初期状態を非表示(none)に */
        .secret-area {
            display: none;
            background-color: #fff5f5;
            border: 1px dashed #ff4757;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1 id="title-trigger">🎡 クルリト</h1>
    <div class="subtitle">カスタムオンラインルーレット</div>

    <div class="main-layout">
        <div class="roulette-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <button id="spin-btn">ルーレットを回す！</button>
        </div>

        <div id="secret-zone" class="secret-area">
            <label style="color: #ff4757;">🤫 【裏設定】当選させるマスの番号（自動ループ）</label>
            <textarea id="secret-order" placeholder="例：&#13;2&#13;3" style="border-color: #ff4757;"></textarea>
            <small style="color: #747d8c; font-size: 11px;">※「メンバーの名前」の上から数えて何番目かを半角数字で入力してください。</small>
        </div>

        <div class="config-area">
            <div class="count-setting">
                <label for="member-count" style="margin-bottom: 0;">ルーレットの人数：</label>
                <input type="number" id="member-count" min="2" max="50" value="3">
                <span style="font-size: 14px; color: #747d8c;">人</span>
            </div>

            <label for="member-input">メンバーの名前</label>
            <textarea id="member-input">1番
2番
3番</textarea>
            <button id="update-btn" style="padding: 8px; font-size: 14px; background-color: #54a0ff; width: 100%;">名前を手動変更したら更新</button>
        </div>

        <div class="result-area">
            <label>🧭 当選履歴</label>
            <ul id="result-list" class="result-list"></ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const updateBtn = document.getElementById('update-btn');
        const memberCountInput = document.getElementById('member-count');
        const memberInput = document.getElementById('member-input');
        const resultListHtml = document.getElementById('result-list');
        const secretOrderInput = document.getElementById('secret-order');
        const secretZone = document.getElementById('secret-zone');
        const titleTrigger = document.getElementById('title-trigger');

        let items = [];
        let orderHistory = [];
        let currentRotation = 0;
        const center = 200;
        const radius = 200;

        const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fd79a8', '#fab1a0', '#00cec9'];

        function initData() {
            const text = memberInput.value.trim();
            items = text === '' ? [] : text.split('\n').map(item => item.trim()).filter(item => item !== '');
            orderHistory = [];
            resultListHtml.innerHTML = '';
            spinBtn.disabled = items.length === 0;
            drawWheel();
        }

        function updateCount(valueStr) {
            if (valueStr === '') return;
            let count = parseInt(valueStr, 10);
            if (isNaN(count)) return;
            if (count < 2) count = 2;
            if (count > 50) count = 50;

            const autoGeneratedItems = [];
            for (let i = 1; i <= count; i++) {
                autoGeneratedItems.push(`${i}番`);
            }
            memberInput.value = autoGeneratedItems.join('\n');
            initData();
        }

        memberCountInput.addEventListener('input', () => updateCount(memberCountInput.value));
        memberCountInput.addEventListener('change', () => {
            let count = parseInt(memberCountInput.value, 10);
            if (isNaN(count) || count < 2) count = 3;
            if (count > 50) count = 50;
            memberCountInput.value = count;
            updateCount(memberCountInput.value);
        });

        // 👑【新機能1】URLのパラメータから裏設定を自動読込（例: ?s=2,3）
        function loadSecretFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const secretParam = urlParams.get('s'); 
            if (secretParam) {
                // カンマ区切りの数字（2,3）を改行に変換してセット
                secretOrderInput.value = secretParam.split(',').join('\n');
            }
        }

        // 👑【新機能2】隠しコマンド：タイトルを5回クリックで裏設定エリアを表示/非表示
        let clickCount = 0;
        let clickTimer;
        titleTrigger.addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            
            // 1秒間クリックが途切れたらカウントをリセット
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);

            if (clickCount >= 5) {
                const isHidden = window.getComputedStyle(secretZone).display === 'none';
                secretZone.style.display = isHidden ? 'block' : 'none';
                clickCount = 0;
            }
        });

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const numItems = items.length;
            if (numItems === 0) return;

            const arcSize = (2 * Math.PI) / numItems;
            for (let i = 0; i < numItems; i++) {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arcSize);
                ctx.lineTo(center, center);
                ctx.fill();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + arcSize / 2);
                ctx.fillStyle = '#2f3542'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'right';
                let displayText = items[i];
                if (displayText.length > 8) displayText = displayText.substring(0, 7) + '...';
                ctx.fillText(displayText, radius - 25, 6);
                ctx.restore();
            }
        }

        function spin() {
            if (items.length === 0) return;
            
            spinBtn.disabled = true;
            updateBtn.disabled = true;
            memberInput.disabled = true;
            memberCountInput.disabled = true;

            const numItems = items.length;
            const degreesPerItem = 360 / numItems;
            
            const secretText = secretOrderInput.value.trim();
            let secretList = secretText === '' ? [] : secretText.split('\n').map(item => item.trim()).filter(item => item !== '');

            let winnerIndex = -1;
            if (secretList.length > 0) {
                const targetNum = parseInt(secretList[0], 10);
                if (!isNaN(targetNum) && targetNum >= 1 && targetNum <= numItems) {
                    winnerIndex = targetNum - 1;
                }
            }

            let targetActualDegrees = 0;
            if (winnerIndex !== -1) {
                const randomOffset = (Math.random() * 0.6 + 0.2) * degreesPerItem;
                const targetPointerAngle = (winnerIndex * degreesPerItem) + randomOffset;
                targetActualDegrees = (270 - targetPointerAngle + 720) % 360;
            } else {
                targetActualDegrees = Math.floor(Math.random() * 360);
            }

            const currentMod = currentRotation % 360;
            let diff = targetActualDegrees - currentMod;
            if (diff < 0) diff += 360;
            
            const totalSpin = 1800 + diff;
            currentRotation += totalSpin;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDegrees = currentRotation % 360;
                let pointerAngle = (270 - actualDegrees + 360) % 360;
                const finalWinnerIndex = Math.floor(pointerAngle / degreesPerItem);
                const winner = items[finalWinnerIndex];

                orderHistory.push(winner);
                const li = document.createElement('li');
                li.innerHTML = `<span class="rank">${orderHistory.length}回目</span> <span>${winner}</span>`;
                resultListHtml.appendChild(li);

                if (winnerIndex !== -1 && finalWinnerIndex === winnerIndex) {
                    const firstItem = secretList.shift();
                    secretList.push(firstItem);
                    secretOrderInput.value = secretList.join('\n');
                }
                
                drawWheel();

                spinBtn.disabled = false;
                updateBtn.disabled = false;
                memberInput.disabled = false;
                memberCountInput.disabled = false;

            }, 4000);
        }

        spinBtn.addEventListener('click', spin);
        updateBtn.addEventListener('click', initData);
        
        // 初回データ読み込みとURLパラメータチェック
        loadSecretFromURL();
        initData();
    </script>
</body>
</html>
